name: Build CleverConnect

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Build Web Client
        run: |
          cd web/client
          bun install
          bun run build

      - name: Build Web Server
        run: |
          cd web/server
          bun install
          bun run build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Download V2Ray, Xray, and Sing-Box cores
        run: |
          mkdir -p core/xray core/v2ray core/sing-box
          
          # Download Xray-core
          echo "Downloading Xray..."
          curl -L -o xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -o xray.zip xray -d core/xray
          chmod +x core/xray/xray
          rm xray.zip
          
          # Download v2ray-core
          echo "Downloading V2Ray..."
          curl -L -o v2ray.zip https://github.com/v2fly/v2ray-core/releases/latest/download/v2ray-linux-64.zip
          unzip -o v2ray.zip v2ray -d core/v2ray
          chmod +x core/v2ray/v2ray
          rm v2ray.zip
          
          # Download sing-box
          echo "Downloading Sing-Box..."
          TAG=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r .tag_name | sed 's/^v//')
          curl -L -o sing-box.tar.gz "https://github.com/SagerNet/sing-box/releases/download/v${TAG}/sing-box-${TAG}-linux-amd64.tar.gz"
          tar -xzf sing-box.tar.gz --strip-components=1 -C core/sing-box "sing-box-${TAG}-linux-amd64/sing-box"
          chmod +x core/sing-box/sing-box
          rm sing-box.tar.gz

      - name: Build Go Project
        run: |
          mkdir -p bin
          go build --ldflags '-extldflags "-Wl,--allow-multiple-definition"' -o bin/clever-connect main.go
          go build --ldflags '-extldflags "-Wl,--allow-multiple-definition"' -o bin/ehco github.com/Ehco1996/ehco/cmd/ehco

      - name: Commit and Push Binaries and Cores
        if: github.event_name != 'pull_request'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Force add built binaries and downloaded cores
          git add -f bin/clever-connect
          git add -f bin/ehco
          git add -f core/xray/xray
          git add -f core/v2ray/v2ray
          git add -f core/sing-box/sing-box
          
          # Check if there are changes before committing
          if git diff --cached --quiet; then
            echo "No changes in compiled binaries or cores. Skipping commit."
          else
            git commit -m "chore(build): update compiled binaries and cores [skip ci]"
            git push origin HEAD:main
          fi

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clever-connect-linux-amd64
          path: |
            bin/
            core/

      - name: Deploy to Clever Cloud
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        env:
          CLEVER_SSH_KEY: ${{ secrets.CLEVER_SSH_KEY }}
        run: |
          if [ -z "$CLEVER_SSH_KEY" ]; then
            echo "CLEVER_SSH_KEY secret is not set. Skipping deployment."
            exit 0
          fi
          
          mkdir -p ~/.ssh
          echo "$CLEVER_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Add Clever Cloud SSH host to known_hosts
          ssh-keyscan -t rsa push-n3-par-clevercloud-customers.services.clever-cloud.com >> ~/.ssh/known_hosts
          
          # Add Clever Cloud git remote and push
          git remote add clever git@push-n3-par-clevercloud-customers.services.clever-cloud.com:app_a8fead43-36bd-4876-b9cb-103c74487ea5.git
          git push -f clever HEAD:master
