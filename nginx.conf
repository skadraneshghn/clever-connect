events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Dynamically map the Upgrade header to prevent 504 timeouts on CDNs
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8080;
        server_name _;

        # Optimize asset delivery to ArvanCloud caching nodes
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

        # Dedicated location for file streaming to optimize throughput and buffering
        location /api/files/stream {
            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Disable proxy buffering for instant media play and high throughput
            proxy_buffering off;
            
            # Allow long streaming downloads
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # 1. Route standard web and API traffic (SPA, JS, CSS, JSON)
        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Correct dynamic WebSocket handling
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            # Prevent proxy timeouts for large assets
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # 2. Route tunnel traffic to the embedded Ehco Engine
        location /tunnel {
            proxy_pass http://127.0.0.1:3001;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade"; # Explicit tunnel upgrade is fine here
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            proxy_read_timeout 86400s; 
            proxy_send_timeout 86400s; 
            proxy_buffering off;       
        }

        # 3. Route HLS traffic to MediaMTX
        location /hls/ {
            proxy_pass http://127.0.0.1:8888/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Disable buffering for instant VOD chunk delivery
            proxy_buffering off;
        }

        # 4. Route WebRTC traffic to MediaMTX
        location /webrtc/ {
            proxy_pass http://127.0.0.1:8889/;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_buffering off;
        }
    }
}
