events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Main server block listening on the port exposed by Clever Cloud
    server {
        listen 8080;
        server_name _;

        # 1. Route standard web and API traffic to the Gin Server
        location / {
            proxy_pass http://127.0.0.1:3000; # Clever Connect Gin App
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support for internal Clever Connect WS/logs WS routes
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
        }

        # 2. Route tunnel traffic to the embedded Ehco Engine via WebSocket
        location /tunnel {
            proxy_pass http://127.0.0.1:3001; # Embedded Ehco Listen Port
            
            # Critical headers for WebSocket / WSS protocol upgrade
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # --- CRITICAL FOR WEBSOCKET TUNNELS ---
            proxy_read_timeout 86400s; # 24 hours
            proxy_send_timeout 86400s; # 24 hours
            proxy_buffering off;       # Immediately push packets, do not buffer
        }
    }
}
